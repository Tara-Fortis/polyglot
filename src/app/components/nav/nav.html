<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
        <a routerLink="/" class="navbar-brand" style="font-size: 1.3rem; vertical-align: middle;"><i class="bi bi-globe" ></i>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#polyBar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <header class="collapse navbar-collapse" id="polyBar">
            <ng-container *transloco="let t">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/about" routerLinkActive="active">{{ t('navBar.about') }}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/contact" routerLinkActive="active">{{ t('navBar.contact')
                            }}</a>
                    </li>
                </ul>
            </ng-container>
            <!--Add the language switcher-->
            <select class="form-select-sm bg-dark text-light border-light" style="width: auto;"
                (change)="switchLang($any($event.target).value)">
                <option value="en">🇬🇧 English</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="es">🇪🇸 Español</option>
            </select>
        </header>
    </div>
</nav>
